name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: hopplo-linux-x64
            archive_type: tar.gz
          - os: windows-latest
            artifact_name: hopplo-windows-x64
            archive_type: zip
          - os: macos-latest
            artifact_name: hopplo-macos
            archive_type: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Tk dependency
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install -r requirements-build.txt

      - name: Build app
        run: pyinstaller --clean hopplo.spec

      - name: Archive Linux build
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.artifact_name }}.tar.gz" -C dist hopplo

      - name: Archive macOS build
        if: runner.os == 'macOS'
        run: tar -czf "${{ matrix.artifact_name }}.tar.gz" -C dist hopplo

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/hopplo -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_type }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.${{ matrix.archive_type }}
